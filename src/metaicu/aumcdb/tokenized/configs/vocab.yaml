# Hydra config for the cleaned AmsterdamUMCdb vocabulary pipeline.
# Run from MetaICU/ unless absolute paths are supplied.

step: source_vocab

paths:
  parent_dir: null
  raw_data_dir: null
  pre_meds_dir: null
  audit_dir: null
  supplied_vocab: null       # bundled aumc_supplied_vocab.csv unless explicitly overridden
  output_vocab: null
  external_root: null
  omop_vocab_dir: null
  source_vocab: audits/vocab_pipeline_source_vocab.csv
  mapping_evidence: audits/vocab_pipeline_mapping_evidence.csv
  candidates: audits/vocab_pipeline_candidates.csv

run:
  overwrite: false

source_vocab:
  dataset: AmsterdamUMCdb
  input_format: raw
  max_rows_per_table: null

hydra:
  job:
    chdir: false
  run:
    dir: .
  output_subdir: null
