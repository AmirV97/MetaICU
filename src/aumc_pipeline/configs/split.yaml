# Hydra config for deterministic AmsterdamUMCdb subject-level splits.
# Run after vocabulary/external setup and before pre-MEDS extraction.
#
# Minimal invocation:
#   build-aumc-split paths.parent_dir=/path/to/workspace

paths:
  parent_dir: null
  raw_data_dir: null      # defaults to parent_dir/data/raw
  metadata_dir: null      # defaults to parent_dir/data/metadata
  split_path: null        # defaults to parent_dir/data/metadata/subject_splits.parquet

run:
  train_frac: 0.8
  val_frac: 0.1
  test_frac: 0.1
  seed: 20260618
  overwrite: false
  split_names:
    train: train
    val: val
    test: test

hydra:
  job:
    chdir: false
  run:
    dir: .
  output_subdir: null
